<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>סטודיו לשיעורי שפה — גרסה יציבה מורחבת</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700&display=swap" rel="stylesheet"><style>:root{--bg:#f3f7fb;--bg2:#eef4f8;--card:#fff;--text:#1f2937;--muted:#667085;--border:#d9e6ef;--accent:#0b7492;--accent2:#2aa7c1;--accent-soft:#e8f7fb;--shadow:0 14px 40px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;font-family:'Heebo','Rubik',Arial,sans-serif;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text)}.header{background:linear-gradient(135deg,var(--accent),#178aa9 55%,var(--accent2));color:#fff;padding:42px 24px;box-shadow:0 16px 40px rgba(11,116,146,.24)}.header-inner{max-width:1400px;margin:auto}.header h1{margin:0 0 10px;font-family:'Rubik','Heebo',sans-serif;font-size:2.1rem}.wrap{max-width:1400px;margin:auto;padding:24px 18px 40px}.grid{display:grid;grid-template-columns:minmax(420px,560px) 1fr;gap:24px;align-items:start}.card{background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}.form{padding:22px}.preview{overflow:hidden;position:sticky;top:16px}.section{margin-bottom:18px}.label{display:block;font-weight:800;margin-bottom:8px}.small{font-size:.92rem;color:var(--muted);line-height:1.55}.select,.textarea,.input{width:100%;padding:13px 15px;border-radius:16px;border:1px solid #d7e3ec;background:#fbfdff;font:inherit}.textarea{min-height:140px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.info-box,.product-box{background:linear-gradient(180deg,#fbfdff,#f5f9fc);border:1px solid #d9e7f0;border-radius:18px;padding:14px}.info-box h3,.product-box h3{margin:0 0 8px;color:var(--accent);font-size:1rem}.list{margin:0;padding-right:18px}.list li{margin:4px 0}.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.product-item{display:flex;gap:10px;align-items:flex-start;background:#fcfdff;border:1px solid #dce7ef;border-radius:16px;padding:12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:14px;padding:10px 14px;font:inherit;font-weight:700;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--accent),#1b93b0);color:#fff}.btn.secondary{background:#f7fbfe;color:var(--accent);border:1px solid #d6e4ee}.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 10px;background:linear-gradient(180deg,#fbfdff,#f4f8fb)}.tab{background:none;border:none;padding:14px;font:inherit;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.panel{padding:22px}.badge{display:inline-block;background:var(--accent-soft);color:var(--accent);border:1px solid #cee8ef;padding:6px 11px;border-radius:999px;font-weight:800;font-size:.85rem;margin-left:6px;margin-bottom:8px}.demo,.prompt,.seq{background:#fff;border:1px solid #dce7ef;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 8px 20px rgba(15,23,42,.04)}.seq{background:linear-gradient(180deg,#f3fbf6,#eef8f2);border-color:#cfe5d7;color:#20543b}.code{white-space:pre-wrap;background:#111827;color:#e5eef7;padding:16px;border-radius:14px;font-family:Consolas,monospace;font-size:.9rem;line-height:1.6;direction:ltr;text-align:left}.prompt-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.prompt-head h3{margin:0;color:var(--accent)}.callout{background:#eef7fb;border:1px solid #d5e7ef;border-radius:14px;padding:10px 12px;color:#48606f;margin-top:10px}.hidden{display:none!important} input[type="checkbox"],input[type="radio"]{accent-color:var(--accent);transform:scale(1.05)}@media(max-width:980px){.grid,.row,.product-grid{grid-template-columns:1fr}.preview{position:static}.header h1{font-size:1.6rem}}</style></head><body><div class="header"><div class="header-inner"><h1>סטודיו לשיעורי שפה — גרסה יציבה מורחבת</h1><div>תת־מיומנות מתעדכנת, מילוי אוטומטי של מטרות ודגשים, והוספת מצבי מקור טקסט.</div></div></div><div class="wrap"><div class="grid"><div class="card form"><div class="section"><label class="label">כיתת יעד</label><select id="grade" class="select"><option>כיתה ב</option><option>כיתה ג</option><option>כיתה ד</option><option>כיתה ה</option><option>כיתה ו</option><option>כיתה ז</option><option>כיתה ח</option><option>כיתה ט</option></select></div><div class="section"><label class="label">תחום</label><select id="domain" class="select"><option>הבנת הנקרא</option><option>הבעה בכתב</option><option>לשון</option><option>ספרות</option><option>אוצר מילים</option></select></div><div class="section"><label class="label">תת־מיומנות / רכיב ביצוע</label><select id="subskill" class="select"></select></div><div class="section info-box" id="skillInfo"></div><div class="row section"><div><label class="label">שלב הוראה</label><select id="stage" class="select"><option>חשיפה / פתיחה</option><option selected>הקניה מפורשת</option><option>תרגול מונחה</option><option>תרגול עצמאי</option><option>העמקה</option><option>הערכה</option><option>חזרה / ביסוס</option></select></div><div><label class="label">רמת ביצוע</label><select id="level" class="select"><option>בסיסית — זיהוי / איתור / תשובה קצרה</option><option selected>בינונית — הסבר / ארגון / נימוק</option><option>מתקדמת — הסקה / ביסוס / השוואה</option><option>מעמיקה — הערכה / העברה / יצירה</option></select></div></div><div class="section info-box" id="stageInfo"></div><div class="section"><label class="label">מטרת הלמידה והדגשים הפדגוגיים</label><textarea id="goal" class="textarea"></textarea><div class="toolbar" style="margin-top:10px"><button class="btn secondary" id="fillBtn" type="button">מלא אוטומטית</button><button class="btn secondary" id="shortBtn" type="button">קצר יותר</button><button class="btn secondary" id="longBtn" type="button">מפורט יותר</button></div></div><div class="section"><label class="label">מקור הטקסט</label><div class="product-grid"><label class="product-item"><input type="radio" name="sourceMode" value="manual" checked> הדבקת טקסט</label><label class="product-item"><input type="radio" name="sourceMode" value="upload"> העלאת קובץ</label><label class="product-item"><input type="radio" name="sourceMode" value="ai"> יצירת טקסט על ידי הבינה</label><label class="product-item"><input type="radio" name="sourceMode" value="improve"> שיפור טקסט על ידי הבינה</label></div></div><div id="manualBox" class="section"><label class="label">טקסט בסיס</label><textarea id="source" class="textarea">יואב ראה שהשמיים התקדרו. הוא סגר במהירות את החלון, אסף את הכביסה מהחבל ורץ לקרוא לאחותו פנימה.</textarea></div><div id="uploadBox" class="section hidden"><label class="label">העלאת קובץ טקסט</label><input id="fileInput" class="input" type="file" accept=".txt,.md,.csv,.html,.json"><div id="fileStatus" class="callout hidden"></div><label class="label" style="margin-top:10px">הנחיות לקובץ</label><textarea id="uploadInstructions" class="textarea" placeholder="למשל: השתמש רק בפסקה הראשונה"></textarea></div><div id="aiBox" class="section hidden"><div class="row"><div><label class="label">סוג הטקסט</label><select id="aiTextType" class="select"><option>סיפור קצר</option><option>טקסט מידע</option><option>טקסט טיעון</option><option>דיאלוג</option><option>שיר קצר</option></select></div><div><label class="label">אורך</label><select id="aiLength" class="select"><option>קצר</option><option selected>בינוני</option><option>ארוך</option></select></div></div><div class="row section"><div><label class="label">נושא הטקסט</label><input id="aiTopic" class="input" value="גשם ראשון"></div><div><label class="label">רמת שפה</label><select id="aiLanguageLevel" class="select"><option>פשוטה מאוד</option><option selected>פשוטה</option><option>בינונית</option><option>עשירה</option></select></div></div><div class="section"><label class="label">מילות מפתח</label><input id="aiKeywords" class="input" value="שמיים, חלון, כביסה, רמז"></div></div><div id="improveBox" class="section hidden"><label class="label">טקסט לשיפור</label><textarea id="improveText" class="textarea">הדביקי כאן טקסט קיים שהבינה תשפר, תפשט, תקצר או תנקד לפי הצורך.</textarea><label class="label" style="margin-top:10px">מה לעשות עם הטקסט?</label><select id="improveAction" class="select"><option>לפשט שפה</option><option>לקצר</option><option>להרחיב</option><option>להוסיף ניקוד</option><option>לשפר ניסוח ואז לבנות תוצרים</option></select></div><div class="row section"><div><label class="label">מספר שאלות בדף עבודה</label><select id="worksheetQuestions" class="select"><option>3</option><option selected>5</option><option>7</option><option>10</option></select></div><div><label class="label">מספר פריטים אינטראקטיביים</label><select id="interactiveItems" class="select"><option>4</option><option selected>6</option><option>8</option><option>10</option></select></div></div><div class="section"><label class="label">תוצרים</label><div class="row"><label><input type="checkbox" data-product="דף עבודה לתרגול" checked> דף עבודה</label><label><input type="checkbox" data-product="פעילות אינטראקטיבית" checked> פעילות אינטראקטיבית</label><label><input type="checkbox" data-product="מצגת להקניה"> מצגת</label><label><input type="checkbox" data-product="מפתח תשובות" checked> מפתח תשובות</label></div></div></div><div class="card preview"><div class="tabs"><button class="tab active" data-tab="preview">תצוגה מקדימה</button><button class="tab" data-tab="prompts">פרומפטים</button></div><div class="panel" id="panel"></div></div></div></div><script>const skillCatalog={'הבנת הנקרא':{'הפקת מידע גלוי':{short:'איתור מידע מפורש הכתוב בטקסט.',purpose:'לאמן תלמידים לזהות ולאתר מידע מפורש בטקסט.',look:['שאלות מי? מה? מתי? היכן?','איתור פרטים מדויקים','הסתמכות ישירה על הטקסט'],prompt:'בנה משימות שמדגישות איתור מידע מפורש.'},'הסקת מסקנות':{short:'הבנת מידע שאינו כתוב במפורש.',purpose:'לפתח יכולת להסיק מידע שאינו נאמר ישירות.',look:['רמזים בטקסט','נימוק ההסקה','מעבר ממידע גלוי למשמעות סמויה'],prompt:'בנה משימות שבהן התלמידים אוספים רמזים ומסיקים מסקנה.'},'פרשנות והערכת טקסט':{short:'הבנת כוונת הכותב והמסר.',purpose:'לפתח קריאה פרשנית והערכה של טקסט.',look:['מטרת הכותב','מסר ועמדה','ניתוח בחירות לשוניות'],prompt:'בנה משימות המתייחסות למסר ולעמדת הכותב.'}},'הבעה בכתב':{'כתיבת תשובה מנומקת':{short:'כתיבת תשובה עם נימוק וביסוס.',purpose:'ללמד תשובה מלאה, עניינית ומבוססת.',look:['תשובה ישירה','נימוק מתאים','דוגמה או ביסוס'],prompt:'בנה משימות לכתיבת תשובה מלאה ומנומקת.'},'כתיבת טיעון':{short:'ניסוח עמדה וביסוסה בנימוקים.',purpose:'לפתח יכולת טיעון בכתב.',look:['טענה ברורה','נימוקים רלוונטיים','מבנה וקישוריות'],prompt:'בנה תוצר הכולל טענה, נימוקים וכתיבה משכנעת.'},'כתיבה מידעית / סיכום':{short:'מסירת מידע מאורגן ותמציתי.',purpose:'לפתח כתיבה מידעית ותמציתית.',look:['ארגון מידע','דיוק לשוני','הבחנה בין עיקר לטפל'],prompt:'בנה משימות לארגון מידע ולסיכום.'}},'לשון':{'מילות קישור':{short:'הבנת תפקידי מילות קישור ושימוש בהן.',purpose:'ללמד לזהות ולהשתמש במילות קישור בהקשר.',look:['זמן, סיבה, תוצאה, ניגוד','בחירת מילה מתאימה','שימוש בטקסט'],prompt:'בנה משימות לזיהוי ושימוש נכון במילות קישור.'},'נושא ונשוא / תחביר':{short:'זיהוי מבנה המשפט והבנת רכיביו.',purpose:'לחזק הבנה תחבירית.',look:['זיהוי רכיבי משפט','שימוש בהקשר','הבנת מבנה'],prompt:'בנה משימות לזיהוי והבנת מבנה המשפט.'},'דיוק לשוני ועריכה':{short:'זיהוי שגיאות ושיפור ניסוח.',purpose:'לפתח מודעות לשונית ויכולת עריכה.',look:['זיהוי שגיאות','תיקון והסבר','שיפור טקסט'],prompt:'בנה משימות לזיהוי ותיקון שגיאות.'}},'ספרות':{'אפיון דמות':{short:'זיהוי תכונות ומניעים של דמות.',purpose:'לפתח קריאה ספרותית דרך הבנת דמויות.',look:['תכונות ומניעים','ביסוס בטקסט','קשר בין התנהגות לאפיון'],prompt:'בנה משימות לאפיון דמות וביסוס מן היצירה.'},'מסר ונושא ביצירה':{short:'זיהוי רעיון מרכזי או מסר.',purpose:'לפתח הבנה פרשנית של יצירה.',look:['רעיון מרכזי','מסר אפשרי','קישור בין פרטים לנושא'],prompt:'בנה משימות לזיהוי מסר ונושא ביצירה.'},'אמצעים ספרותיים בסיסיים':{short:'זיהוי אמצעים ספרותיים בסיסיים.',purpose:'להעמיק הבנה של אמצעים ספרותיים.',look:['זיהוי אמצעי','הסבר תרומה למשמעות','קישור לחוויית הקריאה'],prompt:'בנה משימות לזיהוי אמצעים ספרותיים והסבר תרומתם.'}},'אוצר מילים':{'הבנת מילה בהקשר':{short:'הבנת משמעות מילה לפי ההקשר.',purpose:'להרחיב אוצר מילים דרך קריאה.',look:['רמזים סביב המילה','משמעות בהקשר','הבחנה בין פירושים'],prompt:'בנה משימות להבנת מילה בהקשר.'},'מילים נרדפות והפכים':{short:'הרחבת אוצר מילים דרך קשרי משמעות.',purpose:'להעשיר אוצר מילים ולהבחין בדקויות משמעות.',look:['קשרי משמעות','מילה נרדפת או הפוכה','שימוש במשפט'],prompt:'בנה משימות למילים נרדפות והפכים.'},'משפחות מילים ושורש':{short:'קשרים בין מילים מאותו שורש.',purpose:'לחזק הבנת מבנה המילה.',look:['זיהוי שורש או משפחה','קשר בין מילים','שימוש בהקשר'],prompt:'בנה משימות למשפחות מילים ושורש.'}}};const stageData={'חשיפה / פתיחה':{purpose:'לעורר סקרנות ולהכניס לנושא.'},'הקניה מפורשת':{purpose:'ללמד במפורש מהי המיומנות.'},'תרגול מונחה':{purpose:'לאפשר התנסות ראשונית עם ליווי.'},'תרגול עצמאי':{purpose:'לבסס שליטה עצמאית.'},'העמקה':{purpose:'להעלות את רמת המורכבות.'},'הערכה':{purpose:'להעריך שליטה.'},'חזרה / ביסוס':{purpose:'לחזק מיומנות שנלמדה.'}};const levelData={'בסיסית — זיהוי / איתור / תשובה קצרה':{goal:'ברמת זיהוי, איתור או תשובה קצרה.',focus:'יש לשמור על משימות ממוקדות ופשוטות יחסית.'},'בינונית — הסבר / ארגון / נימוק':{goal:'ברמת הסבר, ארגון מידע או נימוק.',focus:'יש לעודד תשובות מלאות יותר והסבר ברור.'},'מתקדמת — הסקה / ביסוס / השוואה':{goal:'ברמת הסקה, ביסוס או השוואה.',focus:'יש לדרוש קישור בין פרטים וביסוס מן הטקסט.'},'מעמיקה — הערכה / העברה / יצירה':{goal:'ברמת הערכה, העברה או יצירה.',focus:'יש לעודד חשיבה מורכבת והעברה להקשר חדש.'}};const els={grade:document.getElementById('grade'),domain:document.getElementById('domain'),subskill:document.getElementById('subskill'),stage:document.getElementById('stage'),level:document.getElementById('level'),goal:document.getElementById('goal'),source:document.getElementById('source'),worksheetQuestions:document.getElementById('worksheetQuestions'),interactiveItems:document.getElementById('interactiveItems'),skillInfo:document.getElementById('skillInfo'),stageInfo:document.getElementById('stageInfo'),panel:document.getElementById('panel'),fileInput:document.getElementById('fileInput'),fileStatus:document.getElementById('fileStatus'),uploadInstructions:document.getElementById('uploadInstructions'),aiTextType:document.getElementById('aiTextType'),aiLength:document.getElementById('aiLength'),aiTopic:document.getElementById('aiTopic'),aiLanguageLevel:document.getElementById('aiLanguageLevel'),aiKeywords:document.getElementById('aiKeywords'),improveText:document.getElementById('improveText'),improveAction:document.getElementById('improveAction'),manualBox:document.getElementById('manualBox'),uploadBox:document.getElementById('uploadBox'),aiBox:document.getElementById('aiBox'),improveBox:document.getElementById('improveBox')};let currentTab='preview',latestPrompts={},uploadedText='',goalTouched=false;function ageText(g){if(g==='כיתה ב'||g==='כיתה ג')return{goal:'בהתאמה לשפה פשוטה וליכולת הקריאה של תלמידים צעירים.',focus:'יש לשמור על שפה פשוטה, הוראות קצרות, ריווח נוח ועומס נמוך.'};if(g==='כיתה ד'||g==='כיתה ה'||g==='כיתה ו')return{goal:'בהתאמה לרמת ביניים המשלבת בהירות עם עלייה הדרגתית בעצמאות.',focus:'יש לשמור על בהירות, תרגול מדורג ועומס מתון.'};return{goal:'בהתאמה ללומדים בוגרים יותר ולדרישה גבוהה יותר לעצמאות ולנימוק.',focus:'אפשר לדרוש יותר עצמאות, ניתוח וביסוס.'}}function populateSubskills(){const items=Object.keys(skillCatalog[els.domain.value]);els.subskill.innerHTML=items.map(k=>`<option value="${k}">${k}</option>`).join('')}function renderSkillInfo(){const s=skillCatalog[els.domain.value][els.subskill.value];els.skillInfo.innerHTML=`<h3>${els.subskill.value}</h3><p>${s.short}</p><div class="small"><strong>מטרת המיקוד:</strong> ${s.purpose}</div><ul class="list">${s.look.map(i=>`<li>${i}</li>`).join('')}</ul>`}function renderStageInfo(){const s=stageData[els.stage.value];els.stageInfo.innerHTML=`<h3>${els.stage.value}</h3><div class="small"><strong>מטרת השלב:</strong> ${s.purpose}</div>`}function fillGoal(mode='normal'){const skill=skillCatalog[els.domain.value][els.subskill.value];const stage=stageData[els.stage.value];const level=levelData[els.level.value];const age=ageText(els.grade.value);let g=`${skill.purpose} ${stage.purpose} ${level.goal} ${age.goal}`;let f=`${skill.prompt} ${level.focus} ${age.focus}`;if(mode==='short'){g=`${skill.purpose} ${level.goal}`;f=`${level.focus} ${age.focus}`;}if(mode==='long'){g+=` התוצרים צריכים לשקף בבירור את המיומנות, את שלב ההוראה ואת רמת המורכבות שנבחרה.`;f+=` יש להקפיד על הלימה בין סוג התוצר, אופי המשימות, היקף התמיכה ורמת העצמאות הנדרשת מן הלומדים.`;}els.goal.value=`מטרת הלמידה: ${g}\n\nדגשים פדגוגיים: ${f}`;goalTouched=false;renderAll()}function getSelectedProducts(){return[...document.querySelectorAll('[data-product]')].filter(x=>x.checked).map(x=>x.dataset.product)}function getSourceMode(){return document.querySelector('input[name="sourceMode"]:checked')?.value||'manual'}function toggleSourceBoxes(){const m=getSourceMode();els.manualBox.classList.toggle('hidden',m!=='manual');els.uploadBox.classList.toggle('hidden',m!=='upload');els.aiBox.classList.toggle('hidden',m!=='ai');els.improveBox.classList.toggle('hidden',m!=='improve')}function getSourceInstruction(){const m=getSourceMode();if(m==='manual')return`השתמש בטקסט הבא כבסיס: ${els.source.value}`;if(m==='upload')return`המשתמש העלה קובץ.${uploadedText?` תוכן שהתקבל: ${uploadedText}`:''} ${els.uploadInstructions.value?`הנחיות נוספות: ${els.uploadInstructions.value}`:''}`;if(m==='ai')return`כתוב תחילה ${els.aiTextType.value} ${els.aiLength.value} בנושא "${els.aiTopic.value}" ברמת שפה ${els.aiLanguageLevel.value}. שלב את המילים/הרעיונות הבאים: ${els.aiKeywords.value}. לאחר מכן בנה על בסיסו את התוצרים.`;return`שפר תחילה את הטקסט הבא: ${els.improveText.value}. פעולת השיפור המבוקשת: ${els.improveAction.value}. לאחר מכן בנה על בסיסו את התוצרים.`}function state(){return{grade:els.grade.value,domain:els.domain.value,subskill:els.subskill.value,stage:els.stage.value,level:els.level.value,goal:els.goal.value,sourceInstruction:getSourceInstruction(),sourceMode:getSourceMode(),worksheetQuestions:els.worksheetQuestions.value,interactiveItems:els.interactiveItems.value,products:getSelectedProducts()}}function buildPrompts(s){const base=`קהל יעד: ${s.grade}. תחום: ${s.domain}. תת־מיומנות: ${s.subskill}. שלב הוראה: ${s.stage}. רמת ביצוע: ${s.level}. ${s.goal} מקור התוכן: ${s.sourceMode}. ${s.sourceInstruction} כל תוצר חייב להיות HTML עצמאי, RTL מלא וקריא.`;const p={};if(s.products.includes('דף עבודה לתרגול'))p['דף עבודה לתרגול']=`${base}\n\nצור דף עבודה עם בדיוק ${s.worksheetQuestions} שאלות. הדף צריך להתאים גם למענה אינטראקטיבי וגם להדפסה.`;if(s.products.includes('פעילות אינטראקטיבית'))p['פעילות אינטראקטיבית']=`${base}\n\nצור פעילות אינטראקטיבית עם בדיוק ${s.interactiveItems} פריטים.`;if(s.products.includes('מצגת להקניה'))p['מצגת להקניה']=`${base}\n\nצור מצגת להקניה ב-HTML.`;if(s.products.includes('מפתח תשובות'))p['מפתח תשובות']=`${base}\n\nצור מפתח תשובות מותאם לכל השאלות והמשימות.`;return p}function previewHTML(s){return `<div class="demo"><div class="badge">${s.grade}</div><div class="badge">${s.subskill}</div><div class="badge">${s.stage}</div><h2 style="margin:8px 0 12px;color:#0b7492;font-family:'Rubik','Heebo',sans-serif">${s.domain}</h2><div class="demo"><strong>מטרת הלמידה והדגשים:</strong><br>${escapeHtml(s.goal).replace(/\n/g,'<br>')}</div><div class="seq"><strong>תוצרים:</strong> ${s.products.join(' • ')||'לא נבחרו תוצרים'}</div><div class="demo"><strong>מקור התוכן:</strong> ${s.sourceMode}</div></div>`}function promptsHTML(){const entries=Object.entries(latestPrompts);if(!entries.length)return'<div class="small">לא נבחרו תוצרים.</div>';return entries.map(([title,text])=>`<div class="prompt"><div class="prompt-head"><h3>${title}</h3><button class="btn secondary copy-btn" data-title="${escAttr(title)}">העתק פרומפט</button></div><div class="code">${escapeHtml(text)}</div></div>`).join('')}function bindCopy(){document.querySelectorAll('.copy-btn').forEach(btn=>btn.onclick=async()=>{const t=latestPrompts[btn.dataset.title];if(!t)return;try{await navigator.clipboard.writeText(t);alert(`הפרומפט של "${btn.dataset.title}" הועתק`)}catch(e){alert('לא הצלחתי להעתיק אוטומטית.')}})}function escapeHtml(str){return String(str).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function escAttr(str){return String(str).replace(/"/g,'&quot;')}function renderAll(){const s=state();latestPrompts=buildPrompts(s);els.panel.innerHTML=currentTab==='preview'?previewHTML(s):promptsHTML();bindCopy()}document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');currentTab=tab.dataset.tab;renderAll()});document.querySelectorAll('input[name="sourceMode"]').forEach(r=>r.addEventListener('change',()=>{toggleSourceBoxes();renderAll()}));els.domain.addEventListener('change',()=>{populateSubskills();renderSkillInfo();if(!goalTouched)fillGoal('normal');renderAll()});els.subskill.addEventListener('change',()=>{renderSkillInfo();if(!goalTouched)fillGoal('normal');renderAll()});[els.grade,els.stage,els.level].forEach(el=>el.addEventListener('change',()=>{renderStageInfo();if(!goalTouched)fillGoal('normal');renderAll()}));[els.source,els.worksheetQuestions,els.interactiveItems,els.uploadInstructions,els.aiTextType,els.aiLength,els.aiTopic,els.aiLanguageLevel,els.aiKeywords,els.improveText,els.improveAction].forEach(el=>el.addEventListener('input',renderAll));document.querySelectorAll('[data-product]').forEach(el=>el.addEventListener('change',renderAll));els.goal.addEventListener('input',()=>{goalTouched=true;renderAll()});document.getElementById('fillBtn').onclick=()=>fillGoal('normal');document.getElementById('shortBtn').onclick=()=>fillGoal('short');document.getElementById('longBtn').onclick=()=>fillGoal('long');els.fileInput.addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;els.fileStatus.classList.remove('hidden');els.fileStatus.textContent=`נטען קובץ: ${file.name}`;try{uploadedText=await file.text();els.fileStatus.textContent=`נטען קובץ: ${file.name}. נקראו ${uploadedText.length} תווים.`;}catch(err){uploadedText='';els.fileStatus.textContent=`הקובץ ${file.name} נבחר, אך לא נקרא כטקסט.`}renderAll()});populateSubskills();renderSkillInfo();renderStageInfo();fillGoal('normal');toggleSourceBoxes();renderAll();</script></body></html>
