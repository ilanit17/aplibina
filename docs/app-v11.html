<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סטודיו לשיעורי שפה — עיצוב מעודכן</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef4f8 100%);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }
  </style>
</head>
<body>
  <iframe id="appFrame" src="./app-v10.html" title="Language Studio"></iframe>
  <script>
    const frame = document.getElementById('appFrame');

    function injectModernTheme() {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      if (!doc || !win) return;

      if (!doc.getElementById('modern-fonts')) {
        const pre1 = doc.createElement('link');
        pre1.rel = 'preconnect';
        pre1.href = 'https://fonts.googleapis.com';
        doc.head.appendChild(pre1);

        const pre2 = doc.createElement('link');
        pre2.rel = 'preconnect';
        pre2.href = 'https://fonts.gstatic.com';
        pre2.crossOrigin = 'anonymous';
        doc.head.appendChild(pre2);

        const fonts = doc.createElement('link');
        fonts.id = 'modern-fonts';
        fonts.rel = 'stylesheet';
        fonts.href = 'https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Rubik:wght@400;500;700&display=swap';
        doc.head.appendChild(fonts);
      }

      let style = doc.getElementById('modern-theme-style');
      if (!style) {
        style = doc.createElement('style');
        style.id = 'modern-theme-style';
        doc.head.appendChild(style);
      }

      style.textContent = `
        :root{
          --bg:#f4f7fb !important;
          --card:#ffffff !important;
          --text:#1f2937 !important;
          --muted:#667085 !important;
          --border:#dbe5ef !important;
          --accent:#0f6e8c !important;
          --accent2:#1f8eb0 !important;
          --shadow:0 10px 30px rgba(15, 23, 42, 0.08) !important;
          --radius:20px !important;
        }
        html, body {
          font-family:'Heebo', 'Rubik', Arial, sans-serif !important;
          background: radial-gradient(circle at top right, #f9fcff 0%, #f4f7fb 45%, #edf3f8 100%) !important;
          color: var(--text) !important;
        }
        .header {
          background: linear-gradient(135deg, #0f6e8c 0%, #1d84a4 55%, #39a7b8 100%) !important;
          padding: 42px 24px !important;
          box-shadow: 0 12px 40px rgba(15,110,140,.22) !important;
        }
        .header h1 {
          font-family:'Rubik','Heebo',Arial,sans-serif !important;
          font-weight: 700 !important;
          letter-spacing: -0.02em !important;
          font-size: 2.1rem !important;
          margin-bottom: 10px !important;
        }
        .header div {
          font-size: 1rem !important;
          opacity: .96 !important;
        }
        .wrap {
          max-width: 1480px !important;
          padding: 28px 20px 44px !important;
        }
        .grid {
          grid-template-columns: minmax(420px, 520px) 1fr !important;
          gap: 24px !important;
          align-items: start !important;
        }
        .card, .form-card, .preview-card {
          border-radius: 24px !important;
          box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08) !important;
          border: 1px solid rgba(209, 223, 234, 0.9) !important;
          background: rgba(255,255,255,0.96) !important;
          backdrop-filter: blur(6px) !important;
        }
        .form-card { padding: 22px !important; }
        .panel { padding: 22px !important; }
        .section { margin-bottom: 18px !important; }
        .label {
          font-weight: 700 !important;
          font-size: .98rem !important;
          margin-bottom: 8px !important;
          color: #23364a !important;
        }
        .small {
          color: #667085 !important;
          line-height: 1.5 !important;
        }
        .input, .select, .textarea {
          font-family:'Heebo','Rubik',Arial,sans-serif !important;
          border-radius: 16px !important;
          border: 1px solid #d6e1eb !important;
          background: #fbfdff !important;
          box-shadow: inset 0 1px 2px rgba(15,23,42,.03) !important;
          transition: border-color .2s ease, box-shadow .2s ease, transform .15s ease !important;
          padding: 12px 14px !important;
        }
        .input:focus, .select:focus, .textarea:focus {
          outline: none !important;
          border-color: #1f8eb0 !important;
          box-shadow: 0 0 0 4px rgba(31,142,176,.12) !important;
          background: #fff !important;
        }
        .textarea { min-height: 112px !important; }
        .subcard, .stage-box, .skill-box, .product-box {
          background: linear-gradient(180deg, #fbfdff 0%, #f5f9fc 100%) !important;
          border: 1px solid #d9e7f0 !important;
          border-radius: 18px !important;
          padding: 14px !important;
          box-shadow: inset 0 1px 0 rgba(255,255,255,.65) !important;
        }
        .product-item {
          background: #fcfdff !important;
          border-radius: 16px !important;
          border: 1px solid #dbe6ef !important;
          padding: 12px !important;
          transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease !important;
        }
        .product-item:hover {
          transform: translateY(-1px) !important;
          border-color: #b9d4e2 !important;
          box-shadow: 0 8px 20px rgba(31, 142, 176, 0.08) !important;
        }
        .chips { gap: 10px !important; }
        .chip {
          border-radius: 999px !important;
          padding: 9px 14px !important;
          font-weight: 500 !important;
          border: 1px solid #d7e3ec !important;
          background: #fff !important;
          box-shadow: 0 2px 8px rgba(15,23,42,.04) !important;
          transition: all .18s ease !important;
        }
        .chip:hover {
          border-color: #b8d3e0 !important;
          transform: translateY(-1px) !important;
        }
        .chip.active {
          background: linear-gradient(135deg, #0f6e8c 0%, #1f8eb0 100%) !important;
          border-color: transparent !important;
          box-shadow: 0 10px 22px rgba(15,110,140,.24) !important;
        }
        .btn {
          font-family:'Heebo','Rubik',Arial,sans-serif !important;
          font-weight: 700 !important;
          border-radius: 14px !important;
          padding: 11px 15px !important;
          box-shadow: 0 8px 20px rgba(15,110,140,.16) !important;
          transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease !important;
        }
        .btn:hover {
          transform: translateY(-1px) !important;
          box-shadow: 0 12px 24px rgba(15,110,140,.2) !important;
        }
        .btn.secondary {
          background: #f7fbfe !important;
          border: 1px solid #d5e4ee !important;
          color: #0f6e8c !important;
          box-shadow: none !important;
        }
        .btn.secondary:hover {
          box-shadow: 0 8px 18px rgba(15,110,140,.08) !important;
        }
        .tabs {
          background: linear-gradient(180deg, #fbfdff 0%, #f4f8fb 100%) !important;
          padding: 0 10px !important;
        }
        .tab {
          padding: 14px 14px !important;
          border-bottom-width: 3px !important;
          font-weight: 700 !important;
        }
        .tab.active {
          color: #0f6e8c !important;
          border-bottom-color: #0f6e8c !important;
        }
        .preview-shell {
          border-radius: 20px !important;
          border: 1px solid #d9e6ef !important;
          overflow: hidden !important;
          box-shadow: inset 0 1px 0 rgba(255,255,255,.5) !important;
        }
        .slide {
          padding: 26px !important;
          min-height: 460px !important;
          background: linear-gradient(180deg, #ffffff 0%, #f5fbff 100%) !important;
        }
        .slide h2 {
          color: #0f6e8c !important;
          font-family:'Rubik','Heebo',Arial,sans-serif !important;
          font-size: 1.5rem !important;
          margin-top: 6px !important;
        }
        .badge {
          background: #eaf7fb !important;
          color: #0f6e8c !important;
          border: 1px solid #cfe6ef !important;
          padding: 6px 10px !important;
          font-weight: 700 !important;
        }
        .demo-box, .prompt-block {
          background: #fff !important;
          border-radius: 16px !important;
          border: 1px solid #dbe7ef !important;
          box-shadow: 0 8px 20px rgba(15,23,42,.04) !important;
        }
        .sequence {
          border-radius: 16px !important;
          background: linear-gradient(180deg, #f3fbf6 0%, #ecf8f1 100%) !important;
          border: 1px solid #cfe5d7 !important;
          color: #20543b !important;
        }
        .code {
          border-radius: 16px !important;
          border: 1px solid rgba(255,255,255,.05) !important;
          box-shadow: inset 0 1px 0 rgba(255,255,255,.03) !important;
        }
        .file-note {
          border-radius: 14px !important;
          background: #f2fbf4 !important;
          border: 1px solid #cfe5d3 !important;
        }
        input[type="checkbox"] {
          accent-color: #0f6e8c !important;
          transform: scale(1.08) !important;
        }
        @media (max-width: 980px) {
          .grid { grid-template-columns: 1fr !important; }
          .wrap { padding: 18px 14px 32px !important; }
          .header { padding: 34px 18px !important; }
          .form-card, .panel { padding: 16px !important; }
        }
      `;

      const title = doc.querySelector('.header h1');
      if (title) title.textContent = 'סטודיו לשיעורי שפה — עיצוב מעודכן';
      const subtitle = doc.querySelector('.header div');
      if (subtitle) subtitle.textContent = 'ממשק עברי מודרני, נוח לקריאה ולעבודה ממושכת, עם טיפוגרפיה עדכנית ופריסה נקייה';
    }

    frame.addEventListener('load', () => {
      setTimeout(injectModernTheme, 250);
      setTimeout(injectModernTheme, 900);
      setTimeout(injectModernTheme, 1800);
    });
  </script>
</body>
</html>
