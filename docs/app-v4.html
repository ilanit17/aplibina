<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>סטודיו לשיעורי שפה — גרסה עם הסברי מיומנויות</title>
<style>
:root{--bg:#f6f3ee;--card:#fff;--text:#2c2a26;--muted:#6d685f;--border:#d8d2c8;--accent:#1d5c84;--accent2:#2f7bab;--shadow:0 4px 18px rgba(0,0,0,.06);--radius:16px}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Heebo",sans-serif;background:var(--bg);color:var(--text)}
.header{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;padding:36px 20px;text-align:center}.header h1{margin:0 0 8px;font-size:2rem}.wrap{max-width:1320px;margin:0 auto;padding:24px 16px 48px}.grid{display:grid;grid-template-columns:450px 1fr;gap:20px}.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.form-card{padding:18px}.preview-card{overflow:hidden}.section{margin-bottom:14px}.label{display:block;font-weight:700;margin-bottom:6px}.small{font-size:.9rem;color:var(--muted)}.input,.select,.textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font:inherit;background:#fff}.textarea{min-height:96px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--border);padding:8px 12px;border-radius:999px;background:#fff;cursor:pointer}.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}.checkboxes{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cb{display:flex;gap:8px;align-items:flex-start;background:#faf8f4;border:1px solid var(--border);padding:10px;border-radius:12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:11px 14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font:inherit;cursor:pointer}.btn.secondary{background:#eef4f8;color:var(--accent);border:1px solid #cfe0ec}.tabs{display:flex;border-bottom:1px solid var(--border);background:#fbfaf7}.tab{padding:12px 16px;cursor:pointer;border:none;background:none;font:inherit;font-weight:700;color:var(--muted)}.tab.active{color:var(--accent);border-bottom:3px solid var(--accent)}.panel{padding:18px}.preview-shell{background:#f8fafc;border:1px solid #dde7ee;border-radius:14px;overflow:hidden}.slide{padding:28px;min-height:430px;background:linear-gradient(180deg,#ffffff 0%,#f7fbff 100%)}.slide h2{margin-top:0;color:var(--accent)}.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#eaf3f9;color:var(--accent);font-size:.85rem;font-weight:700;margin-left:6px;margin-bottom:6px}.demo-box{background:#fff;border:1px dashed #bdd2e0;border-radius:12px;padding:12px;margin:10px 0}.question{background:#fff;border:1px solid #dce7ef;border-radius:12px;padding:14px;margin:12px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.code{white-space:pre-wrap;background:#121826;color:#e5eef7;padding:16px;border-radius:12px;direction:ltr;text-align:left;font-family:Consolas,monospace;font-size:.88rem;overflow:auto}.subcard{background:#faf8f4;border:1px solid var(--border);padding:12px;border-radius:12px}.file-note{background:#eef7ee;border:1px solid #cfe6cf;padding:10px;border-radius:12px;color:#295b29}.stage-box,.skill-box{background:#f4f8fb;border:1px solid #cfe0ec;border-radius:14px;padding:12px}.stage-box h3,.skill-box h3{margin:0 0 8px;color:var(--accent);font-size:1rem}.stage-box p,.skill-box p{margin:0 0 8px}.info-list{margin:0;padding-right:18px}.info-list li{margin:4px 0}.callout{background:#fff8e8;border:1px solid #ead8a1;color:#6d5615;padding:10px;border-radius:12px;font-size:.9rem}
@media (max-width:980px){.grid,.row,.checkboxes{grid-template-columns:1fr}.header h1{font-size:1.5rem}}
</style>
</head>
<body>
<div class="header"><h1>סטודיו לשיעורי שפה — שלבי הוראה + הסברי מיומנויות</h1><div>הסבר גלוי למורה והנחיות אוטומטיות לפרומפט לפי שלב ההוראה ולפי המיומנות</div></div>
<div class="wrap"><div class="grid"><div class="card form-card">
<div class="section"><label class="label">כיתת יעד</label><select id="grade" class="select"><option>כיתה ב</option><option>כיתה ג</option><option>כיתה ד</option><option>כיתה ה</option><option>כיתה ו</option><option>כיתה ז</option><option>כיתה ח</option><option>כיתה ט</option></select></div>
<div class="section"><label class="label">תחום + מיומנות ליבה</label><select id="domain" class="select"><option>הבנת הנקרא</option><option>הבעה בכתב</option><option>לשון</option><option>ספרות</option><option>אוצר מילים</option></select></div>
<div class="section"><label class="label">תת־מיומנות / רכיב ביצוע</label><select id="subskill" class="select"></select></div>
<div class="section skill-box" id="skillInfo"></div>
<div class="row section"><div><label class="label">שלב בהוראת המיומנות</label><select id="stage" class="select"><option>חשיפה / פתיחה</option><option selected>הקניה מפורשת</option><option>תרגול מונחה</option><option>תרגול עצמאי</option><option>העמקה</option><option>הערכה</option><option>חזרה / ביסוס</option></select></div><div><label class="label">רמת ביצוע</label><select id="level" class="select"><option>רמה 1 — איתור / זיהוי</option><option selected>רמה 2 — הבנה / ארגון</option><option>רמה 3 — הסקה / ביסוס</option><option>רמה 4 — הערכה / העברה</option></select></div></div>
<div class="section stage-box" id="stageInfo"></div>
<div class="section"><label class="label">סוג תוצר</label><div class="chips" id="productChips"></div></div>
<div id="youngSettings" class="section" style="display:none"><label class="label">התאמת שפה לכיתות הצעירות</label><div class="row"><div><label class="label small">רמת ניקוד</label><select id="nikud" class="select"><option>ללא ניקוד</option><option selected>ניקוד חלקי</option><option>ניקוד מלא</option></select></div><div><label class="label small">מה לנקד</label><select id="nikudWhat" class="select"><option selected>הוראות + מילים חדשות</option><option>רק הוראות</option><option>הכול</option></select></div></div></div>
<div class="section"><label class="label">מקור הטקסט שעליו יתבסס התוצר</label><div class="chips" id="sourceModeChips"></div></div>
<div id="manualBox" class="section subcard"><label class="label">הדביקי כאן את הטקסט</label><textarea id="source" class="textarea">יואב ראה שהשמיים התקדרו. הוא סגר במהירות את החלון, אסף את הכביסה מהחבל ורץ לקרוא לאחותו פנימה.</textarea></div>
<div id="uploadBox" class="section subcard" style="display:none"><label class="label">העלאת קובץ טקסט</label><input id="fileInput" class="input" type="file" accept=".txt,.md,.csv,.html,.json" /><div class="small" style="margin-top:8px">בגרסה זו העלאת הקובץ קוראת בעיקר קובצי טקסט. לקובצי PDF/Word מומלץ בינתיים להדביק טקסט.</div><div id="fileStatus" class="file-note" style="display:none;margin-top:10px"></div><label class="label" style="margin-top:10px">הנחיות לגבי החלק הרלוונטי בקובץ</label><textarea id="uploadInstructions" class="textarea" placeholder="למשל: השתמש רק בפסקה הראשונה, פשט את השפה, הוסף שאלות הסקה"></textarea></div>
<div id="aiBox" class="section subcard" style="display:none"><label class="label">יצירת טקסט חדש על ידי הבינה</label><div class="row"><div><label class="label small">סוג הטקסט</label><select id="aiTextType" class="select"><option>סיפור קצר</option><option>טקסט מידע</option><option>טקסט טיעון</option><option>דיאלוג</option><option>שיר קצר</option></select></div><div><label class="label small">אורך</label><select id="aiLength" class="select"><option>קצר</option><option selected>בינוני</option><option>ארוך</option></select></div></div><div class="row"><div><label class="label small">נושא הטקסט</label><input id="aiTopic" class="input" value="גשם ראשון" /></div><div><label class="label small">רמת שפה</label><select id="aiLanguageLevel" class="select"><option>פשוטה מאוד</option><option selected>פשוטה</option><option>בינונית</option><option>עשירה</option></select></div></div><label class="label small" style="margin-top:8px">מילות מפתח / אוצר מילים רצוי</label><input id="aiKeywords" class="input" value="שמיים, חלון, כביסה, רמז" /></div>
<div id="hybridBox" class="section subcard" style="display:none"><label class="label">טקסט קיים + עיבוד על ידי הבינה</label><textarea id="hybridText" class="textarea">הדביקי כאן טקסט קיים שהבינה תעבד, תפשט, תקצר או תנקד לפי הצורך.</textarea><label class="label" style="margin-top:8px">מה לעשות עם הטקסט?</label><select id="hybridAction" class="select"><option>לפשט שפה</option><option>לקצר</option><option>להרחיב</option><option>להוסיף ניקוד</option><option>לעבד ואז לבנות פעילות</option></select></div>
<div class="section"><label class="label">מרכיבים שייכללו בתוצר</label><div class="checkboxes"><label class="cb"><input type="checkbox" checked data-part="פתיחה" />פתיחה לשיעור</label><label class="cb"><input type="checkbox" checked data-part="דוגמה פתורה" />דוגמה פתורה</label><label class="cb"><input type="checkbox" checked data-part="תרגול מונחה" />תרגול מונחה</label><label class="cb"><input type="checkbox" checked data-part="תרגול עצמאי" />תרגול עצמאי</label><label class="cb"><input type="checkbox" checked data-part="מחוון קצר" />מחוון קצר</label><label class="cb"><input type="checkbox" checked data-part="מפתח תשובות" />מפתח תשובות</label></div></div>
<div class="section"><label class="label">מטרת הלמידה והדגשים הפדגוגיים</label><textarea id="goal" class="textarea">התלמידים יסיקו מידע שאינו נאמר במפורש, ינמקו את מסקנותיהם בעזרת רמזים מן הטקסט, ויתרגלו שיח קצר סביב תשובות שונות.</textarea></div>
<div class="toolbar"><button class="btn" id="generateBtn">צור תוצר</button><button class="btn secondary" id="downloadBtn">הורד HTML</button></div>
</div><div class="card preview-card"><div class="tabs"><button class="tab active" data-tab="preview">תצוגה מקדימה</button><button class="tab" data-tab="prompt">פרומפט</button><button class="tab" data-tab="html">קוד HTML</button></div><div class="panel" id="panel"></div></div></div></div>
<script>
const teachingStages={
'חשיפה / פתיחה':{short:'שלב שמטרתו לעורר עניין, לקשר לידע קודם וליצור כניסה ראשונית למיומנות, ללא הוראה מפורשת מלאה.',purpose:'לעורר סקרנות, להפעיל ידע קודם ולהכניס את התלמידים לנושא.',look:['פתיחה קצרה ומעוררת עניין','שאלה ראשונית או גירוי לפתיחה','ללא הסבר שיטתי מלא'],prompt:'השלב הפדגוגי הוא חשיפה / פתיחה. בנה תוצר קצר ומעורר עניין, המחבר לידע קודם ומזמין כניסה ראשונית למיומנות. כלול שאלה, גירוי או משימה פותחת, אך אל תעמיס בהוראה שיטתית מלאה.'},
'הקניה מפורשת':{short:'שלב שבו המיומנות נלמדת באופן ישיר: הגדרה, פירוק לרכיבים, הדגמה ודוגמה ברורה.',purpose:'ללמד באופן ישיר מהי המיומנות ואיך משתמשים בה.',look:['הסבר ברור וישיר','פירוק לשלבים או רכיבים','דוגמה פתורה או מודל'],prompt:'השלב הפדגוגי הוא הקניה מפורשת. הסבר במפורש את המיומנות, פרט את שלבי הביצוע או רכיביה, וכלול דוגמה פתורה או מודל ברור המדגים כיצד עובדים.'},
'תרגול מונחה':{short:'שלב שבו התלמידים מתנסים במיומנות בעזרת הכוונה, שאלות עזר, רמזים ותמיכה מדורגת.',purpose:'לאפשר התנסות ראשונית עם ליווי ותמיכה.',look:['שאלות עזר ורמזים','משימות מדורגות','תמיכות או תבניות'],prompt:'השלב הפדגוגי הוא תרגול מונחה. בנה תרגול שבו התלמידים מתנסים במיומנות עם תמיכה והכוונה. כלול רמזים, שאלות עזר, תבניות או דוגמאות חלקיות, ושמור על דרגת קושי מדורגת.'},
'תרגול עצמאי':{short:'שלב שבו התלמידים מיישמים את המיומנות באופן עצמאי, עם מעט תמיכה, כדי לבסס שליטה.',purpose:'לבדוק ולבסס ביצוע עצמאי של המיומנות.',look:['משימות ברורות','מעט רמזים','דרישה ליישום עצמאי'],prompt:'השלב הפדגוגי הוא תרגול עצמאי. צור משימות ליישום עצמאי של המיומנות, עם מעט תמיכות ורמזים. שמור על הוראות ברורות, אך אל תכוון יתר על המידה.'},
'העמקה':{short:'שלב שבו מרחיבים את השימוש במיומנות, מעלים את רמת המורכבות, ומעודדים ניתוח, השוואה והעברה.',purpose:'להרחיב ולהעמיק את השימוש במיומנות מעבר לבסיס.',look:['מורכבות גבוהה יותר','ניתוח, השוואה, נימוק','אפשרות להעברה להקשר חדש'],prompt:'השלב הפדגוגי הוא העמקה. צור משימות מורכבות יותר המרחיבות את השימוש במיומנות. שלב ניתוח, השוואה, נימוק, בחירה או העברה להקשר חדש.'},
'הערכה':{short:'שלב שבו בודקים את רמת השליטה של התלמיד במיומנות באמצעות משימות מתאימות וקריטריונים ברורים.',purpose:'להעריך את רמת השליטה במיומנות.',look:['מינימום רמזים','משימות מותאמות לבדיקה','מחוון או קריטריונים'],prompt:'השלב הפדגוגי הוא הערכה. בנה משימות המיועדות לבדוק שליטה במיומנות. צמצם רמזים ותמיכות, וכלול מחוון קצר או קריטריונים ברורים לבדיקה.'},
'חזרה / ביסוס':{short:'שלב שמטרתו לרענן, לחזק ולבסס מיומנות שנלמדה, באמצעות תרגול ממוקד וקצר יחסית.',purpose:'לחזק ולרענן מיומנות קיימת.',look:['תזכורת קצרה לעקרונות','תרגול קצר וממוקד','לא שיעור הקניה מלא'],prompt:'השלב הפדגוגי הוא חזרה / ביסוס. צור תוצר שמטרתו לרענן ולחזק את המיומנות. כלול תזכורת קצרה לעקרונות המרכזיים ותרגול ממוקד, אך אל תבנה מחדש יחידת הקניה מלאה.'}
};
const skillCatalog={
'הבנת הנקרא':{
'הפקת מידע גלוי':{short:'מיקוד באיתור מידע מפורש הכתוב בטקסט ובבחירת הפרטים הרלוונטיים לשאלה.',purpose:'לאמן תלמידים לזהות ולאתר מידע מפורש בטקסט.',look:['שאלות מי? מה? מתי? היכן?','איתור פרטים מדויקים','הסתמכות ישירה על הטקסט'],prompt:'המיקוד המיומנותי הוא הפקת מידע גלוי. בנה משימות שמדגישות איתור מידע מפורש, בחירת פרטים רלוונטיים והשענות ישירה על הכתוב בטקסט.'},
'הסקת מסקנות':{short:'מיקוד בהבנת מידע שאינו כתוב במפורש, באמצעות איסוף רמזים והסקה מבוססת.',purpose:'לפתח יכולת להסיק מידע שאינו נאמר ישירות.',look:['רמזים בטקסט','נימוק ההסקה','מעבר ממידע גלוי למשמעות סמויה'],prompt:'המיקוד המיומנותי הוא הסקת מסקנות. בנה משימות שבהן התלמידים אוספים רמזים מן הטקסט, מסיקים מסקנה שאינה נאמרת במפורש, ומנמקים כיצד הגיעו אליה.'},
'פרשנות והערכת טקסט':{short:'מיקוד בהבנת כוונת הכותב, המסר, האמצעים והעמדה כלפי הטקסט.',purpose:'לפתח קריאה פרשנית והערכה של טקסט.',look:['מטרת הכותב','מסר ועמדה','ניתוח בחירות לשוניות או מבניות'],prompt:'המיקוד המיומנותי הוא פרשנות והערכת טקסט. בנה משימות המתייחסות למטרת הכותב, למסר, לעמדה ולאמצעים שבהם הטקסט משתמש.'}
},
'הבעה בכתב':{
'כתיבת תשובה מנומקת':{short:'מיקוד בכתיבת תשובה שיש בה עמדה או קביעה, נימוק ולעיתים גם דוגמה או ביסוס מן הטקסט.',purpose:'ללמד תשובה מלאה, עניינית ומבוססת.',look:['תשובה ישירה','נימוק מתאים','לעיתים גם דוגמה או ביסוס'],prompt:'המיקוד המיומנותי הוא כתיבת תשובה מנומקת. בנה משימות שבהן התלמידים כותבים תשובה מלאה הכוללת מענה לשאלה, נימוק ברור ולעיתים דוגמה או ביסוס מן הטקסט.'},
'כתיבת טיעון':{short:'מיקוד בניסוח עמדה, ביסוסה בנימוקים ובארגון טקסט משכנע.',purpose:'לפתח יכולת טיעון בכתב.',look:['טענה ברורה','נימוקים רלוונטיים','מבנה וקישוריות'],prompt:'המיקוד המיומנותי הוא כתיבת טיעון. בנה תוצר הכולל טענה ברורה, נימוקים רלוונטיים, קישוריות מתאימה וכתיבה משכנעת.'},
'כתיבה מידעית / סיכום':{short:'מיקוד במסירת מידע, ארגון רעיונות והבחנה בין עיקר לטפל.',purpose:'לפתח כתיבה מידעית ותמציתית.',look:['ארגון מידע','דיוק לשוני','הבחנה בין עיקר לטפל'],prompt:'המיקוד המיומנותי הוא כתיבה מידעית או סיכום. בנה משימות המחייבות ארגון מידע, דיוק, והבחנה בין עיקר לטפל.'}
},
'לשון':{

function renderStageInfo(){const s=teachingStages[stageEl.value];stageInfo.innerHTML=`<h3>${stageEl.value}</h3><p>${s.short}</p><div class="small"><strong>מטרת השלב:</strong> ${s.purpose}</div><ul class="info-list">${s.look.map(i=>`<li>${i}</li>`).join('')}</ul><div class="callout">ההנחיה הזאת תיכנס אוטומטית גם לפרומפט.</div>`;}

function buildPrompt(s){const nikudPart=(s.grade==='כיתה ב'||s.grade==='כיתה ג')?`\nהתאמת שפה לכיתות הצעירות: ${s.nikud}; מה לנקד: ${s.nikudWhat}.`:'';return `אתה מומחה בפיתוח חומרי הוראה בשפה העברית.\nקהל יעד: ${s.grade}.\nתחום: ${s.domain}.\nתת־מיומנות: ${s.subskill}.\nמשמעות המיקוד המיומנותי: ${s.skillInfo.short}\nהנחיה פדגוגית למיומנות זו: ${s.skillInfo.prompt}\nשלב בהוראת המיומנות: ${s.stage}.\nמשמעות השלב: ${s.stageInfo.short}\nהנחיה פדגוגית לשלב זה: ${s.stageInfo.prompt}\nרמת ביצוע: ${s.level}.\nסוג תוצר: ${s.product}.\nמקור תוכן: ${s.sourceMode}.${nikudPart}\nמטרת הלמידה: ${s.goal}\nכלול בתוצר: ${s.parts.join('، ')}.\n${s.sourceInstruction}\nכתוב בעברית תקינה, RTL מלא, עיצוב קריא, והפק גם גרסה למורה בעת הצורך.`;}
function buildPreviewHTML(s){const nikudLine=(s.grade==='כיתה ב'||s.grade==='כיתה ג')?`<div class="badge">${s.nikud} · ${s.nikudWhat}</div>`:''; const sourceBadge=`<div class="badge">${s.sourceMode}</div>`; const stageBadge=`<div class="badge">${s.stage}</div>`; const skillBadge=`<div class="badge">${s.subskill}</div>`;
